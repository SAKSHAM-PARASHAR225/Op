<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS Numericals Practice</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Georgia, serif; background:#0f0f1a; color:#e0e0f0; min-height:100vh; }

/* HERO */
.hero { background:linear-gradient(135deg,#1a0533,#0d1a3a,#001a2e); padding:40px 20px 30px; text-align:center; border-bottom:3px solid #e94560; }
.hero h1 { font-size:2.2em; color:#fff; margin-bottom:8px; }
.hero h1 span { color:#e94560; }
.hero p { color:#8899cc; font-size:1em; }
.score-bar { display:flex; gap:16px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
.score-pill { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:20px; padding:6px 18px; font-size:0.85em; color:#ccd6f6; }
.score-pill span { color:#e94560; font-weight:700; font-size:1.1em; }

/* TABS */
.tabs { background:#12122a; border-bottom:1px solid #2a2a50; padding:0 20px; display:flex; gap:0; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { padding:13px 18px; font-size:0.82em; color:#8899cc; cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-1px; white-space:nowrap; font-family:Georgia,serif; transition:all 0.2s; }
.tab.active { color:#e94560; border-bottom-color:#e94560; }
.tab:hover { color:#fff; }

/* MAIN */
.main { max-width:900px; margin:0 auto; padding:30px 20px; }

/* QUESTION CARD */
.q-card { background:#1a1a2e; border:1px solid #2a2a50; border-radius:14px; margin-bottom:24px; overflow:hidden; }
.q-head { background:linear-gradient(90deg,#1e1e40,#1a1a2e); border-bottom:1px solid #2a2a50; padding:16px 22px; display:flex; gap:12px; align-items:center; }
.q-num { background:#e94560; color:#fff; border-radius:8px; padding:3px 12px; font-size:0.78em; font-weight:700; flex-shrink:0; }
.q-tag { background:rgba(255,255,255,0.05); border:1px solid #3a3a60; border-radius:20px; padding:3px 12px; font-size:0.75em; color:#8899cc; }
.q-marks { margin-left:auto; color:#f7c948; font-size:0.82em; }
.q-body { padding:22px; }
.q-text { font-size:0.98em; color:#ccd6f6; line-height:1.8; margin-bottom:18px; }
.q-text strong { color:#fff; }

/* TABLE in question */
.q-table { background:#12122a; border:1px solid #2a2a50; border-radius:8px; overflow:auto; margin:12px 0; }
.q-table table { width:100%; border-collapse:collapse; font-size:0.85em; }
.q-table th { background:#1e1e40; color:#8899ee; padding:9px 14px; text-align:center; border:1px solid #2a2a50; font-family:'Courier New',monospace; }
.q-table td { padding:8px 14px; text-align:center; border:1px solid #2a2a50; color:#ccd6f6; }
.q-table tr:nth-child(even) td { background:rgba(255,255,255,0.02); }

/* OPTIONS (MCQ) */
.options { display:grid; gap:10px; margin-bottom:14px; }
.opt { background:#12122a; border:1.5px solid #2a2a50; border-radius:8px; padding:12px 18px; cursor:pointer; display:flex; align-items:center; gap:12px; font-size:0.93em; color:#ccd6f6; transition:all 0.2s; }
.opt:hover { border-color:#5566aa; background:#1a1a3a; }
.opt.selected { border-color:#7788dd; background:#1a1a40; }
.opt.correct { border-color:#43e97b !important; background:rgba(67,233,123,0.08) !important; color:#43e97b !important; }
.opt.wrong   { border-color:#e94560 !important; background:rgba(233,69,96,0.08) !important; color:#e94560 !important; }
.opt-key { background:#2a2a50; color:#8899cc; border-radius:5px; padding:2px 9px; font-family:'Courier New',monospace; font-size:0.82em; flex-shrink:0; }
.opt.correct .opt-key { background:rgba(67,233,123,0.2); color:#43e97b; }
.opt.wrong   .opt-key { background:rgba(233,69,96,0.2); color:#e94560; }

/* NUMERICAL INPUT */
.num-input-wrap { display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
.num-input { background:#12122a; border:1.5px solid #2a2a50; border-radius:8px; padding:11px 16px; color:#fff; font-size:1em; font-family:'Courier New',monospace; width:200px; outline:none; transition:border-color 0.2s; }
.num-input:focus { border-color:#7788dd; }
.num-input.correct { border-color:#43e97b; }
.num-input.wrong   { border-color:#e94560; }

/* BUTTONS */
.btn { padding:10px 24px; border-radius:8px; border:none; font-size:0.9em; cursor:pointer; font-family:Georgia,serif; font-weight:700; transition:all 0.2s; }
.btn-check { background:#e94560; color:#fff; }
.btn-check:hover { background:#c73050; }
.btn-check:disabled { background:#555; cursor:not-allowed; }
.btn-sol { background:transparent; border:1.5px solid #5566aa; color:#8899cc; font-size:0.83em; padding:8px 18px; }
.btn-sol:hover { border-color:#7788dd; color:#ccd6f6; }
.btn-next { background:#1971c2; color:#fff; }
.btn-next:hover { background:#1560a0; }

/* FEEDBACK */
.feedback { border-radius:8px; padding:12px 16px; margin:12px 0; font-size:0.9em; display:none; }
.feedback.show { display:block; }
.feedback.ok   { background:rgba(67,233,123,0.08); border:1px solid rgba(67,233,123,0.3); color:#43e97b; }
.feedback.bad  { background:rgba(233,69,96,0.08);  border:1px solid rgba(233,69,96,0.3);  color:#e94560; }
.feedback.info { background:rgba(100,130,255,0.08); border:1px solid rgba(100,130,255,0.3); color:#8899ee; }

/* SOLUTION BOX */
.solution { background:#0d0d20; border:1px solid #2a2a50; border-radius:10px; padding:18px 20px; margin:14px 0; display:none; }
.solution.show { display:block; }
.solution h4 { color:#f7c948; margin-bottom:12px; font-size:0.9em; text-transform:uppercase; letter-spacing:1px; }
.sol-step { background:#12122a; border-left:3px solid #e94560; border-radius:5px; padding:10px 14px; margin:8px 0; font-family:'Courier New',monospace; font-size:0.83em; color:#a0b0e0; white-space:pre-wrap; line-height:1.6; }
.sol-ans { background:rgba(67,233,123,0.08); border:1px solid rgba(67,233,123,0.3); border-radius:7px; padding:10px 14px; margin-top:10px; color:#43e97b; font-weight:700; font-size:0.9em; }

/* PROGRESS */
.progress-wrap { background:#12122a; border-radius:30px; height:6px; margin:20px 0; overflow:hidden; }
.progress-bar { background:linear-gradient(90deg,#e94560,#f7c948); height:100%; border-radius:30px; transition:width 0.4s; }

/* FINAL SCREEN */
.final { text-align:center; padding:50px 20px; display:none; }
.final.show { display:block; }
.final h2 { font-size:2em; color:#f7c948; margin-bottom:14px; }
.final .big-score { font-size:4em; font-weight:900; color:#e94560; margin:20px 0; }
.final p { color:#8899cc; margin-bottom:24px; }
.grade { display:inline-block; background:#1a1a2e; border:2px solid #f7c948; border-radius:10px; padding:16px 30px; margin:10px; }
.grade .gl { font-size:0.78em; color:#8899cc; text-transform:uppercase; }
.grade .gv { font-size:1.5em; font-weight:700; color:#fff; }

/* HINT */
.hint { color:#f7c948; font-size:0.82em; margin-top:6px; }
.hint::before { content:'💡 Hint: '; }

/* CATEGORY HEADER */
.cat-header { text-align:center; margin:30px 0 20px; }
.cat-header h2 { font-size:1.4em; color:#fff; display:inline-flex; align-items:center; gap:10px; }
.cat-label { background:#e94560; color:#fff; border-radius:20px; padding:3px 14px; font-size:0.7em; }

@media(max-width:600px) { .hero h1{font-size:1.6em} .num-input{width:150px} }
</style>
</head>

<script>
// ── GLOBAL STATE ──────────────────────────────
let score = 0, attempted = 0, correct = 0;
let answered = {}; // track which q's answered

// ── QUESTIONS DATA ────────────────────────────
const questions = [

// ═══════════ DEADLOCK ═══════════
{
  id:'d1', cat:'deadlock', marks:2,
  tag:'Deadlock Formula',
  text:`Given 3 processes with maximum resource needs: P1 = 4, P2 = 3, P3 = 5.
What is the <strong>minimum number of resource units</strong> that guarantees NO deadlock?`,
  type:'mcq',
  options:['9','10','8','11'],
  answer:1, // index 0-based
  hint:'Formula: Min for no deadlock = (Σxi - n) + 1',
  solution:[
    `n = 3 processes
x1 = 4,  x2 = 3,  x3 = 5

Step 1: Σxi = 4 + 3 + 5 = 12

Step 2: Max ensuring DEADLOCK = Σxi - n = 12 - 3 = 9

Step 3: Min ensuring NO DEADLOCK = 9 + 1 = 10`
  ],
  ans_text:'Minimum units for no deadlock = 10'
},

{
  id:'d2', cat:'deadlock', marks:2,
  tag:'Deadlock Formula',
  text:`A system has 4 processes. Their maximum resource needs are: P1=3, P2=4, P3=5, P4=2.
What is the <strong>maximum number of units</strong> that still ensures deadlock (worst case)?`,
  type:'numerical',
  answer:'10',
  hint:'Formula: Max ensuring deadlock = Σxi - n',
  solution:[
    `n = 4,  Σxi = 3+4+5+2 = 14

Max ensuring DEADLOCK = Σxi - n = 14 - 4 = 10

Why? In worst case each process holds (xi-1) units:
P1 holds 2, P2 holds 3, P3 holds 4, P4 holds 1
Total held = 10. Each waits for 1 more → Circular wait!`
  ],
  ans_text:'Max units ensuring deadlock = 10'
},

{
  id:'d3', cat:'deadlock', marks:2,
  tag:'Deadlock Formula',
  text:`There are 5 processes where each process needs a maximum of <strong>3 units</strong> of a resource.
Find the minimum number of resource units needed to guarantee that the system is <strong>always deadlock-free</strong>.`,
  type:'mcq',
  options:['10','11','12','15'],
  answer:1,
  hint:'Same formula: min = (Σxi - n) + 1. All xi = 3, n = 5.',
  solution:[
    `n = 5 processes
Each needs max 3 units → xi = 3 for all
Σxi = 3 × 5 = 15

Max ensuring DEADLOCK  = 15 - 5 = 10
Min ensuring NO deadlock = 10 + 1 = 11`
  ],
  ans_text:'11 units guarantee no deadlock'
},

// ═══════════ BANKER'S ═══════════
{
  id:'b1', cat:'bankers', marks:5,
  tag:"Banker's — Find Available",
  text:`A system has 3 resource types. Total resources = [9, 3, 6].
The current Allocation matrix is:
<div class="q-table"><table>
<tr><th>Process</th><th>A</th><th>B</th><th>C</th></tr>
<tr><td>P0</td><td>3</td><td>0</td><td>1</td></tr>
<tr><td>P1</td><td>2</td><td>1</td><td>1</td></tr>
<tr><td>P2</td><td>3</td><td>1</td><td>2</td></tr>
</table></div>
What is the <strong>Available</strong> vector [A, B, C]?`,
  type:'mcq',
  options:['[1, 1, 2]','[2, 1, 3]','[1, 1, 3]','[0, 1, 2]'],
  answer:0,
  hint:'Available = Total - Sum of all Allocations',
  solution:[
    `Total resources = [9, 3, 6]

Sum of Allocations:
  A: 3+2+3 = 8
  B: 0+1+1 = 2
  C: 1+1+2 = 4

Available = Total - Allocated
  A: 9 - 8 = 1
  B: 3 - 2 = 1
  C: 6 - 4 = 2`
  ],
  ans_text:'Available = [1, 1, 2]'
},

{
  id:'b2', cat:'bankers', marks:5,
  tag:"Banker's — Need Matrix",
  text:`Given the following Max and Allocation matrices:
<div class="q-table"><table>
<tr><th>Process</th><th>Max A</th><th>Max B</th><th>Max C</th><th>Alloc A</th><th>Alloc B</th><th>Alloc C</th></tr>
<tr><td>P0</td><td>7</td><td>5</td><td>3</td><td>0</td><td>1</td><td>0</td></tr>
<tr><td>P1</td><td>3</td><td>2</td><td>2</td><td>2</td><td>0</td><td>0</td></tr>
<tr><td>P2</td><td>9</td><td>0</td><td>2</td><td>3</td><td>0</td><td>2</td></tr>
</table></div>
What is the <strong>Need</strong> of P2?`,
  type:'mcq',
  options:['[6, 0, 0]','[7, 5, 3]','[3, 0, 2]','[6, 1, 0]'],
  answer:0,
  hint:'Need = Max - Allocation for each resource',
  solution:[
    `Need = Max - Allocation

P2:  Max = [9, 0, 2]
     Alloc= [3, 0, 2]

Need[P2] = [9-3, 0-0, 2-2]
          = [6, 0, 0]`
  ],
  ans_text:'Need of P2 = [6, 0, 0]'
},

{
  id:'b3', cat:'bankers', marks:5,
  tag:"Banker's — Safe Sequence",
  text:`Using the Banker's Algorithm with Available = [3, 3, 2] and the Need matrix below, which process can run <strong>first</strong> in a safe sequence?
<div class="q-table"><table>
<tr><th>Process</th><th>Need A</th><th>Need B</th><th>Need C</th></tr>
<tr><td>P0</td><td>7</td><td>4</td><td>3</td></tr>
<tr><td>P1</td><td>1</td><td>2</td><td>2</td></tr>
<tr><td>P2</td><td>6</td><td>0</td><td>0</td></tr>
<tr><td>P3</td><td>0</td><td>1</td><td>1</td></tr>
<tr><td>P4</td><td>4</td><td>3</td><td>1</td></tr>
</table></div>`,
  type:'mcq',
  options:['P0 (Need [7,4,3])','P1 (Need [1,2,2])','P2 (Need [6,0,0])','P3 (Need [0,1,1])'],
  answer:3,
  hint:'Find the process whose Need ≤ Available [3,3,2]',
  solution:[
    `Available = [3, 3, 2]

Check each process: Need ≤ Available?

P0: [7,4,3] ≤ [3,3,2]? → 7>3 ✗ NO
P1: [1,2,2] ≤ [3,3,2]? → 1≤3, 2≤3, 2≤2 ✓ YES
P2: [6,0,0] ≤ [3,3,2]? → 6>3 ✗ NO
P3: [0,1,1] ≤ [3,3,2]? → 0≤3, 1≤3, 1≤2 ✓ YES

Both P1 and P3 qualify. P3 runs first (smallest need).
Actually P1 also qualifies. Multiple correct start points.
P3 is first: Need [0,1,1] ≤ [3,3,2] ✓`
  ],
  ans_text:'P3 (Need [0,1,1] ≤ Available [3,3,2] ✓)'
},

{
  id:'b4', cat:'bankers', marks:5,
  tag:"Banker's — Full Safe Sequence",
  text:`System: Resources X=5, Y=5, Z=5. Allocation and Request matrices:
<div class="q-table"><table>
<tr><th>Process</th><th>Alloc X</th><th>Alloc Y</th><th>Alloc Z</th><th>Request X</th><th>Request Y</th><th>Request Z</th></tr>
<tr><td>P0</td><td>1</td><td>2</td><td>1</td><td>1</td><td>0</td><td>3</td></tr>
<tr><td>P1</td><td>2</td><td>0</td><td>1</td><td>0</td><td>1</td><td>2</td></tr>
<tr><td>P2</td><td>2</td><td>2</td><td>1</td><td>1</td><td>2</td><td>0</td></tr>
</table></div>
Which process finishes <strong>last</strong> in the safe sequence?`,
  type:'mcq',
  options:['P0','P1','P2','System is in deadlock'],
  answer:2,
  hint:'Calculate Available = [5,5,5] - total_alloc, then run safety algorithm.',
  solution:[
    `Step 1: Calculate Available
  Total = [5,5,5]
  Total Alloc = [1+2+2, 2+0+2, 1+1+1] = [5, 4, 3]
  Available = [5-5, 5-4, 5-3] = [0, 1, 2]

Step 2: Safety Algorithm
  Work = [0,1,2]

  P1: Request [0,1,2] ≤ Work [0,1,2]? ✓
    Work = [0,1,2] + [2,0,1] = [2,1,3]

  P0: Request [1,0,3] ≤ Work [2,1,3]? ✓
    Work = [2,1,3] + [1,2,1] = [3,3,4]

  P2: Request [1,2,0] ≤ Work [3,3,4]? ✓
    Work = [3,3,4] + [2,2,1] = [5,5,5]

Safe Sequence: P1 → P0 → P2`
  ],
  ans_text:'P2 finishes LAST. Safe sequence: P1 → P0 → P2'
},

{
  id:'b5', cat:'bankers', marks:5,
  tag:"Banker's — Request Validation",
  text:`Available = [3, 2, 2]. Need matrix is shown.
<div class="q-table"><table>
<tr><th>Process</th><th>Need A</th><th>Need B</th><th>Need C</th></tr>
<tr><td>P0</td><td>8</td><td>4</td><td>2</td></tr>
<tr><td>P1</td><td>3</td><td>0</td><td>0</td></tr>
<tr><td>P2</td><td>1</td><td>2</td><td>2</td></tr>
</table></div>
P1 makes request <strong>[2, 0, 0]</strong>. Should this be <strong>granted</strong>?`,
  type:'mcq',
  options:['Yes — request ≤ Need and ≤ Available, results in safe state','No — request exceeds Need of P1','No — insufficient Available resources','Yes — but only after rollback'],
  answer:0,
  hint:'Check: Request ≤ Need? AND Request ≤ Available? Then run safety algorithm.',
  solution:[
    `Step 1: Is Request ≤ Need[P1]?
  Request [2,0,0] ≤ Need[P1] [3,0,0]? ✓

Step 2: Is Request ≤ Available?
  Request [2,0,0] ≤ Available [3,2,2]? ✓

Step 3: Pretend to allocate:
  Available = [3,2,2] - [2,0,0] = [1,2,2]
  P1's Alloc += [2,0,0], Need[P1] = [1,0,0]

Step 4: Safety check with Work=[1,2,2]:
  P1: Need[1,0,0] ≤ [1,2,2] ✓  Work=[1,2,2]+P1_alloc=[4,2,2]
  P2: Need[1,2,2] ≤ [4,2,2] ✓  Work=[6,4,3] (approx)
  P0: Need[8,4,2] - check... ✓  Safe!

Safe sequence exists → GRANT request ✓`
  ],
  ans_text:'Request is GRANTED — results in safe state ✓'
},

// ═══════════ MEMORY ALLOCATION ═══════════
{
  id:'m1', cat:'memory', marks:2,
  tag:'First Fit Algorithm',
  text:`Memory partitions (in order): <strong>100KB, 500KB, 200KB, 300KB, 600KB</strong>
A process of size <strong>212KB</strong> arrives. Using <strong>First Fit</strong>, which partition gets allocated?`,
  type:'mcq',
  options:['100KB partition','500KB partition','200KB partition','300KB partition'],
  answer:1,
  hint:'First Fit: scan from start, use FIRST partition that is large enough.',
  solution:[
    `Partitions in order: 100KB, 500KB, 200KB, 300KB, 600KB
Process size: 212KB

Scan from beginning:
  100KB: 100 < 212 ✗  (too small)
  500KB: 500 ≥ 212 ✓  (FIRST sufficient partition!)

→ Allocate to 500KB partition
  Used: 212KB
  Leftover: 500 - 212 = 288KB`
  ],
  ans_text:'500KB partition is allocated (first sufficient hole found)'
},

{
  id:'m2', cat:'memory', marks:2,
  tag:'Best Fit Algorithm',
  text:`Memory holes available: <strong>100KB, 500KB, 200KB, 300KB, 600KB</strong>
Process size = <strong>212KB</strong>. Using <strong>Best Fit</strong>, which partition is chosen?`,
  type:'mcq',
  options:['500KB','200KB','300KB','600KB'],
  answer:2,
  hint:'Best Fit: search ALL partitions, pick the SMALLEST one that is still large enough.',
  solution:[
    `Available holes: 100KB, 500KB, 200KB, 300KB, 600KB
Process: 212KB

Search ALL holes for smallest that fits 212KB:
  100KB: 100 < 212 ✗
  500KB: 500 ≥ 212 ✓ (candidate, leftover = 288)
  200KB: 200 < 212 ✗
  300KB: 300 ≥ 212 ✓ (candidate, leftover = 88) ← SMALLEST leftover!
  600KB: 600 ≥ 212 ✓ (candidate, leftover = 388)

Best Fit → 300KB (leftover = 88KB, minimum wasted space)`
  ],
  ans_text:'300KB partition — smallest hole that still fits the process'
},

{
  id:'m3', cat:'memory', marks:2,
  tag:'Worst Fit Algorithm',
  text:`Holes: <strong>100KB, 500KB, 200KB, 300KB, 600KB</strong>
Process = <strong>212KB</strong>. <strong>Worst Fit</strong> allocates to which partition?`,
  type:'mcq',
  options:['300KB','500KB','600KB','200KB'],
  answer:2,
  hint:'Worst Fit: pick the LARGEST available hole.',
  solution:[
    `Available holes: 100KB, 500KB, 200KB, 300KB, 600KB
Process: 212KB

Search ALL holes for largest that fits 212KB:
  100KB: too small ✗
  500KB: fits ✓
  200KB: too small ✗
  300KB: fits ✓
  600KB: fits ✓  ← LARGEST!

Worst Fit → 600KB partition
  Used: 212KB
  Leftover: 600 - 212 = 388KB (biggest leftover)`
  ],
  ans_text:'600KB partition — the largest available hole'
},

{
  id:'m4', cat:'memory', marks:2,
  tag:'Address Space Calculation',
  text:`Physical address space = <strong>64KB</strong>. Word size = <strong>4 bytes</strong>.
How many <strong>bits</strong> are required for a physical address?`,
  type:'numerical',
  answer:'14',
  hint:'Convert to words first, then address_bits = log₂(space_in_words)',
  solution:[
    `Physical address space = 64KB = 2^16 bytes
Word size = 4 bytes = 2^2 bytes

Space in words = 2^16 / 2^2 = 2^14 words

Physical address size = log₂(2^14) = 14 bits`
  ],
  ans_text:'14 bits needed for physical address'
},

{
  id:'m5', cat:'memory', marks:2,
  tag:'Fragmentation MCQ',
  text:`Requests arrive in order: 300K, 25K, 125K, 50K.

// ── FILTER & RENDER ───────────────────────────
let currentTab = 'all';

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function getFiltered() {
  if (currentTab==='all') return questions;
  return questions.filter(q=>q.cat===currentTab);
}

function render() {
  const qs = getFiltered();
  const area = document.getElementById('mainArea');

  if (!qs.length) { area.innerHTML='<p style="color:#888;text-align:center;padding:40px">No questions in this category yet.</p>'; return; }

  let html = `<div class="progress-wrap"><div class="progress-bar" id="pbar" style="width:0%"></div></div>`;

  // Category headers
  const cats = {deadlock:'💀 Deadlock',bankers:"🏦 Banker's Algorithm",memory:'📦 Memory Allocation',paging:'📄 Paging',pagerep:'🔄 Page Replacement',disk:'💿 Disk Scheduling'};
  let lastCat = null;

  qs.forEach((q,i)=>{
    if (q.cat!==lastCat) {
      if (currentTab==='all') html+=`<div class="cat-header"><h2>${cats[q.cat]} <span class="cat-label">${q.cat.toUpperCase()}</span></h2></div>`;
      lastCat=q.cat;
    }

    const isAnswered = answered[q.id]!==undefined;
    const isCorrect  = answered[q.id]===true;

    html += `<div class="q-card" id="card_${q.id}">
      <div class="q-head">
        <span class="q-num">Q${i+1}</span>
        <span class="q-tag">${q.tag}</span>
        <span class="q-marks">${q.marks} marks</span>
      </div>
      <div class="q-body">
        <div class="q-text">${q.text}</div>`;

    if (q.hint) html+=`<div class="hint">${q.hint}</div>`;

    // OPTIONS OR INPUT
    if (q.type==='mcq') {
      html+=`<div class="options" id="opts_${q.id}">`;
      const keys=['A','B','C','D'];
      q.options.forEach((opt,j)=>{
        let cls='opt'; let extra='';
        if (isAnswered) {
          if (j===q.answer) cls+=' correct';
          else if (answered[`${q.id}_sel`]===j && j!==q.answer) cls+=' wrong';
        }
        html+=`<div class="${cls}" data-qid="${q.id}" data-idx="${j}" onclick="selectOpt(this,'${q.id}',${j},${q.answer})">
          <span class="opt-key">${keys[j]}</span>${opt}</div>`;
      });
      html+=`</div>`;
    } else {
      // numerical
      const inputCls = isAnswered ? (isCorrect?'num-input correct':'num-input wrong') : 'num-input';
      const val = isAnswered ? (answered[`${q.id}_val`]||'') : '';
      html+=`<div class="num-input-wrap">
        <input class="${inputCls}" type="text" id="inp_${q.id}" placeholder="Enter your answer..." value="${val}" ${isAnswered?'disabled':''}/>
        ${!isAnswered?`<button class="btn btn-check" onclick="checkNum('${q.id}','${q.answer}')">Check</button>`:''}
      </div>`;
    }

    // Feedback
    let fbCls='feedback', fbTxt='';
    if (isAnswered) {
      fbCls += isCorrect?' ok show':' bad show';
      fbTxt = isCorrect ? '✅ Correct! Well done!' : `❌ Incorrect. The correct answer is: <strong>${q.ans_text}</strong>`;
    }
    html+=`<div class="${fbCls}" id="fb_${q.id}">${fbTxt}</div>`;

    // Solution
    html+=`<div class="solution${isAnswered?' show':''}" id="sol_${q.id}">
      <h4>📋 Step-by-Step Solution</h4>`;
    q.solution.forEach(s=>{html+=`<div class="sol-step">${s}</div>`;});
    html+=`<div class="sol-ans">✅ Answer: ${q.ans_text}</div></div>`;

    // Buttons
    html+=`<div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">`;
    if (!isAnswered && q.type==='mcq') html+=`<button class="btn btn-check" id="chkbtn_${q.id}" onclick="checkMCQ('${q.id}',${q.answer})" disabled>Check Answer</button>`;
    html+=`<button class="btn btn-sol" onclick="toggleSol('${q.id}')">Show/Hide Solution</button>`;
    html+=`</div>`;

    html+=`</div></div>`;
  });

  area.innerHTML = html;
  updateScoreBar();
  updateProgress();
}

// ── INTERACTIONS ────────────────────────────
function selectOpt(el, qid, idx, correct) {
  if (answered[qid]!==undefined) return;
  // deselect all
  document.querySelectorAll(`[data-qid="${qid}"]`).forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  answered[`${qid}_sel`] = idx;
  document.getElementById(`chkbtn_${qid}`).disabled = false;
}

function checkMCQ(qid, correct) {
  const q = questions.find(q=>q.id===qid);
  const sel = answered[`${qid}_sel`];
  if (sel===undefined) return;

  const isCorrect = sel===correct;
  answered[qid] = isCorrect;
  if (!isCorrect) answered[`${qid}_wrong`] = sel;

  attempted++;
  if (isCorrect) correct_count();

  // Update option styles
  document.querySelectorAll(`[data-qid="${qid}"]`).forEach((o,j)=>{
    o.onclick = null;
    if (j===correct) o.classList.add('correct');
    else if (j===sel && j!==correct) o.classList.add('wrong');
    o.classList.remove('selected');
  });

  // Show feedback
  const fb = document.getElementById(`fb_${qid}`);
  fb.classList.add('show');
  if (isCorrect) { fb.classList.add('ok'); fb.innerHTML='✅ Correct! Well done!'; }
  else { fb.classList.add('bad'); fb.innerHTML=`❌ Incorrect. Correct answer: <strong>${q.ans_text}</strong>`; }

  // Show solution
  document.getElementById(`sol_${qid}`).classList.add('show');

  // Hide check button
  const btn = document.getElementById(`chkbtn_${qid}`);
  if (btn) btn.style.display='none';

  updateScoreBar();
  updateProgress();
}

function checkNum(qid, correct) {
  const q = questions.find(q=>q.id===qid);
  const inp = document.getElementById(`inp_${qid}`);
  const val = inp.value.trim();
  answered[`${qid}_val`] = val;

  const isCorrect = val.toLowerCase() === correct.toLowerCase();
  answered[qid] = isCorrect;
  attempted++;
  if (isCorrect) correct_count();

  inp.disabled = true;
  inp.classList.add(isCorrect?'correct':'wrong');

  const fb = document.getElementById(`fb_${qid}`);
  fb.classList.add('show');
  if (isCorrect) { fb.classList.add('ok'); fb.innerHTML='✅ Correct! Well done!'; }
  else { fb.classList.add('bad'); fb.innerHTML=`❌ Incorrect. Correct answer: <strong>${q.ans_text}</strong>`; }

  document.getElementById(`sol_${qid}`).classList.add('show');
  updateScoreBar();
  updateProgress();
}

function correct_count() { correct++; score++; }

function toggleSol(qid) {
  const sol = document.getElementById(`sol_${qid}`);
  sol.classList.toggle('show');
}

function updateScoreBar() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('totalVal').textContent = questions.length;
  document.getElementById('attVal').textContent = attempted;
  document.getElementById('corrVal').textContent = correct;
}

function updateProgress() {
  const pct = (attempted / questions.length) * 100;
  const bar = document.getElementById('pbar');
  if (bar) bar.style.width = pct+'%';
}

// ── INIT ──────────────────────────────────
render();
</script>
</body>
</html>
